AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS Ghost Developer — Secrets Management Stack.
  Deploy this ONCE before deploying the main stack.
  Manages the API key used to authenticate MCP clients.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

  ApiKeyValue:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: >
      The API key value (min 32 chars). Generate with:
        scripts/gen-secret.sh
    ConstraintDescription: Must be at least 32 characters.

Resources:

  GhostDeveloperApiKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${Environment}/ghost-developer/api-key"
      Description: !Sub "API key for AWS Ghost Developer MCP server (${Environment})"
      SecretString: !Sub |
        {"api_key": "${ApiKeyValue}"}
      Tags:
        - Key: Project
          Value: aws-ghost-developer
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # Rotation is optional — uncomment if you want auto-rotation
  # RotationSchedule:
  #   Type: AWS::SecretsManager::RotationSchedule
  #   Properties:
  #     SecretId: !Ref GhostDeveloperApiKey
  #     RotationRules:
  #       AutomaticallyAfterDays: 90

  # Resource policy: only the Ghost Developer Lambda role can read this secret
  SecretResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref GhostDeveloperApiKey
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyAllExceptLambda
            Effect: Deny
            Principal: "*"
            Action: "secretsmanager:GetSecretValue"
            Resource: "*"
            Condition:
              StringNotLike:
                aws:PrincipalArn:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/aws-ghost-developer-role-${Environment}"
                  # Allow admin roles for break-glass access
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/Admin*"

Outputs:
  SecretArn:
    Description: ARN of the API key secret
    Value: !Ref GhostDeveloperApiKey
    Export:
      Name: !Sub "ghost-developer-api-key-arn-${Environment}"

  SecretName:
    Description: Name of the secret (use in Lambda env var API_KEY_SECRET_NAME)
    Value: !Sub "${Environment}/ghost-developer/api-key"
