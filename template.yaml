AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: AWS Ghost Developer — MCP Serverless Agent for RCA

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 29
    MemorySize: 256
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        POWERTOOLS_SERVICE_NAME: aws-ghost-developer

Resources:

  # ── Lambda Function ────────────────────────────────────────────────────────

  GhostDeveloperFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "aws-ghost-developer-${Environment}"
      CodeUri: src/
      Handler: handler.lambda_handler
      Description: MCP Server for AWS RCA — SQS DLQ, CloudWatch Insights, RDS PI
      Role: !GetAtt GhostDeveloperRole.Arn
      AutoPublishAlias: live          # needed for provisioned concurrency
      ProvisionedConcurrencyConfig:
        ProvisionedConcurrentExecutions: 1
      Events:
        McpPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref McpApi
            Path: /mcp
            Method: POST
        McpGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref McpApi
            Path: /mcp
            Method: GET
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref McpApi
            Path: /health
            Method: GET

  # ── API Gateway (HTTP API) ─────────────────────────────────────────────────

  McpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Description: MCP HTTP API for AWS Ghost Developer
      Auth:
        DefaultAuthorizer: LambdaRequestAuthorizer
        Authorizers:
          LambdaRequestAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionInvokeRole: !GetAtt AuthorizerInvokeRole.Arn
            AuthorizerPayloadFormatVersion: "2.0"
            EnableSimpleResponses: true
            Identity:
              Headers:
                - x-api-key
        # /health bypass auth so load balancers can reach it
        RouteSettings:
          "GET /health":
            ThrottlingBurstLimit: 10
            ThrottlingRateLimit: 10
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
        AllowHeaders:
          - Content-Type
          - x-api-key

  # ── Lambda Authorizer ──────────────────────────────────────────────────────

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "aws-ghost-developer-authorizer-${Environment}"
      CodeUri: src/
      Handler: authorizer.lambda_handler
      Role: !GetAtt GhostDeveloperRole.Arn
      Environment:
        Variables:
          API_KEY_SECRET_NAME: !Sub "${Environment}/ghost-developer/api-key"

  AuthorizerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeAuthorizer
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt AuthorizerFunction.Arn

  # ── IAM Role ───────────────────────────────────────────────────────────────

  GhostDeveloperRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "aws-ghost-developer-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GhostDeveloperPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              - Sid: SQSReadOnly
                Effect: Allow
                Action:
                  - sqs:ListQueues
                  - sqs:ReceiveMessage
                  - sqs:GetQueueAttributes
                Resource: "*"

              - Sid: CloudWatchLogsInsights
                Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:StartQuery
                  - logs:GetQueryResults
                  - logs:StopQuery
                Resource: "*"

              - Sid: XRayRead
                Effect: Allow
                Action:
                  - xray:GetTraceSummaries
                  - xray:BatchGetTraces
                  - xray:GetServiceGraph
                Resource: "*"

              - Sid: SecretsManagerReadOnly
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:*:${AWS::AccountId}:secret:${Environment}/ghost-developer/*"

# ── Outputs ──────────────────────────────────────────────────────────────────

Outputs:
  McpEndpoint:
    Description: MCP endpoint URL — paste this into mcp_config.json
    Value: !Sub "https://${McpApi}.execute-api.${AWS::Region}.amazonaws.com/mcp"

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt GhostDeveloperFunction.Arn
